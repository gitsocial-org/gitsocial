version: "2"
linters:
  enable:
    - misspell
    - prealloc
    - unconvert
    - unparam
  settings:
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - path: _test\.go
        linters:
          - errcheck
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/gitsocial-org/gitsocial
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
