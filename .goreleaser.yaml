version: 2

project_name: gitsocial

builds:
  - id: darwin
    main: ./cli/gitsocial
    binary: gitsocial
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [darwin]
    goarch: [amd64, arm64]
    hooks:
      post:
        - 'rcodesign sign --p12-file=/tmp/cert.p12 --p12-password={{ .Env.APPLE_CERT_PASSWORD }} --code-signature-flags=runtime {{ .Path }}'
  - id: other
    main: ./cli/gitsocial
    binary: gitsocial
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: darwin
    ids: [darwin]
    formats: [zip]
  - id: other
    ids: [other]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

release:
  github:
    owner: gitsocial-org
    name: gitsocial
  prerelease: auto

homebrew_casks:
  - name: gitsocial
    binaries:
      - gitsocial
    repository:
      owner: gitsocial-org
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_HOMEBREW_CASK_GITHUB_TOKEN }}"
    homepage: https://github.com/gitsocial-org/gitsocial
    description: "Git-native collaboration — posts, issues, PRs, releases, all in your repo"
    license: MIT

scoops:
  - repository:
      owner: gitsocial-org
      name: scoop-bucket
      token: "{{ .Env.GORELEASER_SCOOP_GITHUB_TOKEN }}"
    homepage: https://github.com/gitsocial-org/gitsocial
    description: "Git-native collaboration — posts, issues, PRs, releases, all in your repo"
    license: MIT
