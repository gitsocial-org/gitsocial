<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Defense-in-depth CSP (the whitelist sanitizer is the primary control). A
     static bucket has no response headers, so the policy rides in a meta tag.
     Directives derived from what the shell actually needs: 'unsafe-inline' for
     the inline <style> and <script> blocks below; img-src allows https: (the
     sanitizer's absolute-badge parity) plus blob:/data: (in-bucket image object
     URLs); connect-src allows https: so the ?base=/?repo= cross-bucket override
     keeps working. object-src/base-uri/form-action are locked down.
     frame-ancestors/report-uri are omitted (ignored in a meta CSP). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; font-src 'self'; connect-src 'self' https:; object-src 'none'; base-uri 'none'; form-action 'none'">
<title>gitsocial</title>
<!-- Favicon: the gitsocial mark (same path as the sidebar/footer logo) inlined as
     a data: URI so the bucket serves no extra object and it works offline. Stroked
     in the default logo color (#27134f). -->
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20200%20200'%3E%3Cpath%20d='m%20191,100%20c%200,3%20-0.1,5%20-0.3,8%20C%20187,148%20158,181%20118,189%2075,198%2033,175%2016,135%20-1,95%2013,49%2049,25%2085,0%20133,5%20164,35%20M%20109,10%20C%2092,9%2067,17%2055,34%2037,59%2045,98%2085,100%20h%2026%20l%2079,0'%20fill='none'%20stroke='%2327134f'%20stroke-width='18'%20stroke-linecap='square'%20stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="pages-app.css">
</head>
<body>
<button id="nav-handle" class="nav-handle" aria-label="Show navigation" title="Show navigation">»</button>
<!-- Mobile top bar (shown only <=720px): a hamburger that opens the sidebar as a
     slide-over drawer, plus the repo title. The desktop collapse handle (»)
     stays desktop-only; the hamburger is the sole mobile mechanism. -->
<div id="mobile-bar" class="mobile-bar">
  <button id="nav-hamburger" class="nav-hamburger" aria-label="Open navigation" aria-expanded="false" aria-controls="nav"><svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
  <a id="mobile-title" class="mobile-title" href="#/">repository</a>
</div>
<div id="nav-scrim" class="nav-scrim"></div>
<div class="shell">
  <aside class="nav">
    <div class="nav-header">
      <a class="repo-title" id="repo-title" href="#/">repository</a>
      <button id="theme-toggle" class="theme-icon" aria-label="Toggle dark mode" title="Toggle theme">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g id="moon-icon">
            <mask id="moon-mask">
              <rect width="20" height="20" fill="white" />
              <circle cx="16" cy="7" r="10" fill="black" />
            </mask>
            <circle cx="10" cy="10" r="10" fill="currentColor" mask="url(#moon-mask)" />
          </g>
          <g id="sun-icon" style="display: none;">
            <circle cx="10" cy="10" r="3" fill="currentColor" />
            <path d="M10 1V3M10 17V19M19 10H17M3 10H1M16.5 3.5L15.1 4.9M4.9 15.1L3.5 16.5M16.5 16.5L15.1 15.1M4.9 4.9L3.5 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </g>
        </svg>
      </button>
      <button id="width-toggle" class="nav-collapse" aria-label="Toggle layout width" title="Toggle fixed/full width">↔</button>
      <button id="nav-collapse" class="nav-collapse" aria-label="Collapse navigation" title="Collapse navigation">«</button>
    </div>
    <!-- Nav item glyphs mirror the TUI nav panel (component_nav_panel.go +
         extensions/*/nav.go): Timeline ⏱, Issues ○, Pull Requests ⑂, Releases ⏏,
         Memos ☞, Lists ☷ (social My Lists), Analytics ◧, Configuration ⚙
         (util_router.go). Home/Code have no TUI nav item, so they take tasteful
         stand-ins (⌂, ❯); Branches reuses the TUI "My Repository" branch glyph ⎇.
         Grouping is website-oriented rather than a strict TUI mirror: the PM
         section holds Board, Issues, Milestones, Sprints; the site-only Repository
         group leads with Pull Requests, then Code, Branches (the code-and-changes
         cluster), hoisted directly after PM so code is high in the list; and
         Releases/Memos trail as single-destination plain links. Sections are
         non-collapsible labels; child links keep their data-nav so
         #nav a[data-nav] still matches them through the wrapper. -->
    <nav id="nav">
      <a href="#/search" data-nav="search"><span class="nav-icon">⌕</span>Search</a>
      <a href="#/" data-nav="home"><span class="nav-icon">⌂</span>Home</a>
      <div class="nav-group">
        <div class="nav-section">Social</div>
        <a href="#/timeline" data-nav="timeline"><span class="nav-icon">⏱</span>Timeline</a>
        <a href="#/lists" data-nav="lists"><span class="nav-icon">☷</span>Lists</a>
      </div>
      <div class="nav-group">
        <div class="nav-section">PM</div>
        <a href="#/board" data-nav="board"><span class="nav-icon">▦</span>Board</a>
        <a href="#/issues" data-nav="issues"><span class="nav-icon">○</span>Issues</a>
        <a href="#/milestones" data-nav="milestones"><span class="nav-icon">◇</span>Milestones</a>
        <a href="#/sprints" data-nav="sprints"><span class="nav-icon">◷</span>Sprints</a>
      </div>
      <div class="nav-group">
        <div class="nav-section">Repository</div>
        <a href="#/prs" data-nav="prs"><span class="nav-icon">⑂</span>Pull Requests</a>
        <a href="#/code" data-nav="code"><span class="nav-icon">❯</span>Code<span id="nav-code-search" class="nav-search" role="button" tabindex="0" aria-label="Search files" title="Search files"></span></a>
        <!-- Filled by gs-app.js (updateCodeSidebar) in code/dir/blob routes only: a
             compact repo file tree nested under Code, sharing the content tree's
             expansion state. Empty (and display:none) on every other route. -->
        <div id="nav-tree-slot" class="nav-tree-slot"></div>
        <a href="#/branches" data-nav="branches"><span class="nav-icon">⎇</span>Branches</a>
        <a href="#/graph" data-nav="graph"><span class="nav-icon">⑃</span>Graph</a>
        <a href="#/tags" data-nav="tags"><span class="nav-icon">⌗</span>Tags</a>
      </div>
      <a href="#/releases" data-nav="releases"><span class="nav-icon">⏏</span>Releases</a>
      <a href="#/memos" data-nav="memos" id="nav-memos"><span class="nav-icon">☞</span>Memos</a>
      <a href="#/analytics" data-nav="analytics"><span class="nav-icon">◧</span>Analytics</a>
      <a href="#/config" data-nav="config"><span class="nav-icon">⚙</span>Configuration</a>
    </nav>
    <!-- Sidebar footer: the brand credit, pinned to the bottom of the nav column
         (margin-top:auto). Replaces the old page-wide footer element. -->
    <div class="nav-footer">
      <a class="foot-brand" href="https://gitsocial.org">
        <svg class="logo-small" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="m 191,100 c 0,3 -0.1,5 -0.3,8 C 187,148 158,181 118,189 75,198 33,175 16,135 -1,95 13,49 49,25 85,0 133,5 164,35 M 109,10 C 92,9 67,17 55,34 37,59 45,98 85,100 h 26 l 79,0" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="square" stroke-linejoin="round" />
        </svg>
        <span>Built with GitSocial</span>
      </a>
    </div>
  </aside>
  <main id="view" class="content"><div class="loading">Loading…</div></main>
</div>
<script>
  // Theme toggle, reused verbatim from docs/index.html: prefers-color-scheme
  // default plus a persisted body.light-mode / body.dark-mode override.
  (function () {
    const toggleButton = document.getElementById('theme-toggle');
    const moonIcon = document.getElementById('moon-icon');
    const sunIcon = document.getElementById('sun-icon');
    const body = document.body;
    function getSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function getCurrentTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) return savedTheme.replace('-mode', '');
      return getSystemTheme();
    }
    function updateIcon(theme) {
      if (theme === 'dark') { moonIcon.style.display = 'none'; sunIcon.style.display = 'block'; }
      else { moonIcon.style.display = 'block'; sunIcon.style.display = 'none'; }
    }
    function setTheme(theme) {
      body.classList.remove('light-mode', 'dark-mode');
      body.classList.add(theme + '-mode');
      localStorage.setItem('theme', theme + '-mode');
      updateIcon(theme);
    }
    body.classList.add(getCurrentTheme() + '-mode');
    updateIcon(getCurrentTheme());
    toggleButton.addEventListener('click', () => {
      const currentTheme = getCurrentTheme();
      setTheme(currentTheme === 'dark' ? 'light' : 'dark');
    });
  })();
  // Sidebar collapse: hide the nav to a floating expand handle, persisted to
  // localStorage['navCollapsed']. Independent of the narrow-screen top-nav CSS,
  // which still applies to the nav while it is shown.
  (function () {
    const body = document.body;
    const collapse = document.getElementById('nav-collapse');
    const handle = document.getElementById('nav-handle');
    function apply(collapsed) {
      body.classList.toggle('nav-collapsed', collapsed);
      try { localStorage.setItem('navCollapsed', collapsed ? '1' : '0'); } catch (e) { /* private mode */ }
    }
    let saved = '0';
    try { saved = localStorage.getItem('navCollapsed') || '0'; } catch (e) { /* private mode */ }
    body.classList.toggle('nav-collapsed', saved === '1');
    collapse.addEventListener('click', () => apply(true));
    handle.addEventListener('click', () => apply(false));
  })();
  // Layout width toggle: body.wide lifts the shell's max-width (code/diff
  // friendly); fixed is the reading default. Persisted like the theme.
  (function () {
    const body = document.body;
    const toggle = document.getElementById('width-toggle');
    let saved = 'fixed';
    try { saved = localStorage.getItem('layout') || 'fixed'; } catch (e) { /* private mode */ }
    body.classList.toggle('wide', saved === 'wide');
    toggle.addEventListener('click', () => {
      const wide = !body.classList.contains('wide');
      body.classList.toggle('wide', wide);
      try { localStorage.setItem('layout', wide ? 'wide' : 'fixed'); } catch (e) { /* private mode */ }
    });
  })();
  // Mobile hamburger drawer: the hamburger opens the sidebar as a slide-over,
  // closed by the scrim, by any navigation (hashchange), or by following a nav
  // link. This is the sole mobile mechanism; the desktop collapse handle is CSS-
  // hidden below 720px, and a persisted desktop-collapse can't hide the drawer
  // (its display:flex is forced in the media query).
  (function () {
    const body = document.body;
    const burger = document.getElementById('nav-hamburger');
    const scrim = document.getElementById('nav-scrim');
    const nav = document.querySelector('.nav');
    function setOpen(open) {
      body.classList.toggle('nav-open', open);
      if (burger) burger.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
    if (burger) burger.addEventListener('click', () => setOpen(!body.classList.contains('nav-open')));
    if (scrim) scrim.addEventListener('click', () => setOpen(false));
    window.addEventListener('hashchange', () => setOpen(false));
    if (nav) nav.addEventListener('click', (e) => { if (e.target.closest && e.target.closest('a[href^="#"]')) setOpen(false); });
  })();
</script>
<script>
  // Configure Prism before it loads so it never auto-highlights the page: the
  // reader drives it explicitly via Prism.tokenize. prism.js is a relative
  // same-origin asset (self-contained constraint holds); when it is absent the
  // reader falls back to plain text nodes.
  window.Prism = window.Prism || {};
  window.Prism.manual = true;
</script>
<script src="prism.js"></script>
<!-- Non-base grammars (python/rust/c/...) are not bundled here: the reader
     lazy-loads grammars/prism-<lang>.js on first use (gs-render.js ensureGrammar)
     and upgrades the plain text in place, so the shell stays small and a repo
     pays only for the languages a visitor opens. A missing grammar file stays
     plain text (a clean fallback). -->
<script src="icons.js"></script>
<script src="gs-core.js"></script>
<script src="gs-render.js"></script>
<script src="gs-app.js"></script>
</body>
</html>
